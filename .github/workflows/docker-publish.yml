name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'
      - 'Dockerfile'
      - 'Caddyfile-*'
  pull_request:
    branches:
      - main
    paths:
      - 'version.txt'
      - 'Dockerfile'
      - 'Caddyfile-*'
  workflow_dispatch:

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        run: echo "VERSION=$(cat "version.txt" | head -1)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/webdav:${{ env.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/webdav:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            ## Docker WebDAV Server v${{ env.VERSION }}

            ### Docker Image
            - `docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/webdav:${{ env.VERSION }}`
            - `docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/webdav:latest`

            ### Base Components
            - **Caddy Server**: v${{ env.VERSION }}
            - **WebDAV Plugin**: [mholt/caddy-webdav](https://github.com/mholt/caddy-webdav)
            - **Cloudflare DNS Plugin**: [caddy-dns/cloudflare](https://github.com/caddy-dns/cloudflare)

            ### Platforms
            - linux/amd64
            - linux/arm64

            ### Documentation
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for usage instructions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
